services:
  - type: web
    name: hazardviewer-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: psql $DATABASE_URL -f db/schema.sql && python db/seed_counties.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hazardviewer-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: hazardviewer-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: hazardviewer-api
          type: web
          property: host

  - type: cron
    name: hazardviewer-sync
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    schedule: '0 2 * * *' # Every day at 2 AM
    startCommand: python cron/sync_fema.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hazardviewer-db
          property: connectionString

databases:
  - name: hazardviewer-db
    databaseName: hazardviewer
    plan: free
    postgresMajorVersion: '18'
