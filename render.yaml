services:
  - type: web
    name: floodreport-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: floodreport-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: floodreport-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: floodreport-api
          type: web
          property: host

  - type: cron
    name: floodreport-sync
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    schedule: '0 2 * * *'
    startCommand: python cron/sync_fema.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: floodreport-db
          property: connectionString

databases:
  - name: floodreport-db
    databaseName: floodreport
    plan: free
    postgresMajorVersion: '18'
